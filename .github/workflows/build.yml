name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Build workspace packages
        run: |
          npm run build:bruno-common
          npm run build:bruno-converters
          npm run build:bruno-requests
          npm run build:bruno-query

      - name: Build bruno-app
        working-directory: packages/bruno-app
        run: npm run build

      - name: Copy web build to electron
        shell: pwsh
        run: Copy-Item -Recurse -Force packages/bruno-app/dist/* packages/bruno-electron/web/

      - name: Build Windows installer
        working-directory: packages/bruno-electron
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: packages/bruno-electron/out/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Build workspace packages
        run: |
          npm run build:bruno-common
          npm run build:bruno-converters
          npm run build:bruno-requests
          npm run build:bruno-query

      - name: Build bruno-app
        working-directory: packages/bruno-app
        run: npm run build

      - name: Copy web build to electron
        run: cp -r packages/bruno-app/dist/* packages/bruno-electron/web/

      - name: Build macOS installer
        working-directory: packages/bruno-electron
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: packages/bruno-electron/out/*.dmg

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
